name: Daily Screener Update

on:
  schedule:
    # Run every Monday to Friday at 11:30 AM UTC (4:30 PM IST)
    - cron: '30 11 * * 1-5'
  workflow_dispatch: # Enable manual triggers from GitHub UI

jobs:
  update-screener:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push changes back
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Screener Generator
        run: node scripts/update_data.js

      - name: Commit and Push screener.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/screener.json
          # Commit only if there are changes to avoid failing the workflow when data is identical
          git diff-index --quiet HEAD || git commit -m "Auto-update market data [skip ci]"
          git push
