name: Daily Screener Update

on:
  schedule:
    # Run every Monday to Friday at 11:30 AM UTC (4:30 PM IST)
    - cron: '30 11 * * 1-5'
  workflow_dispatch: # Enable manual triggers from GitHub UI

jobs:
  update-screener:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install system dependencies
        run: sudo apt-get install -y unzip

      - name: Run Screener Generator (with retry)
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3..."
            node scripts/update_data.js && echo "Success on attempt $attempt" && break
            if [ $attempt -eq 3 ]; then
              echo "All 3 attempts failed. Exiting."
              exit 1
            fi
            echo "Attempt $attempt failed. Retrying in 60 seconds..."
            sleep 60
          done

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Always write a heartbeat timestamp — this ensures a commit always happens,
          # which keeps the repo "active" so GitHub never auto-pauses this schedule.
          echo "Last successful run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/last_updated.txt

          git add data/screener.json .github/last_updated.txt

          # If screener.json changed, use a descriptive message; otherwise just heartbeat
          if git diff --cached --quiet -- data/screener.json; then
            git commit -m "ci: heartbeat keep-alive [skip ci]"
          else
            git commit -m "Auto-update market data $(date -u '+%Y-%m-%d') [skip ci]"
          fi
          git push
